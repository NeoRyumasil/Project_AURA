name: aura
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - torchvision
  - torchaudio
  - pip
  - pip:
      - qwen-tts>=0.1.1
      - transformers>=4.48.0
      - huggingface-hub
      - accelerate
      - soundfile
      - librosa
      - numpy
      - python-dotenv
      - pyvts==0.3.3
      - aiohttp
      - httpx
      - anthropic
      - # Loosened LiveKit constraints for macOS Apple Silicon
      - livekit-agents[silero,turn-detector]
      - livekit-plugins-noise-cancellation
      - livekit-plugins-deepgram
      - livekit-plugins-cartesia
      - livekit-plugins-openai
      - livekit-api
      - opencv-python
      - supabase==2.28.0
      - supabase-auth==2.28.0
      - supabase-functions==2.28.0
      - -e ./lib/faster-qwen3-tts