name: aura
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip
  - pip:
      - qwen-tts>=0.1.1
      - transformers>=4.48.0
      - huggingface-hub
      - accelerate
      - soundfile
      - librosa
      - numpy
      - python-dotenv
      - pyvts
      - aiohttp
      - livekit-agents[silero,turn-detector]==1.5.1
      - livekit-plugins-noise-cancellation>=0.2.3
      - livekit-plugins-deepgram==1.5.1
      - livekit-plugins-cartesia==1.5.1
      - livekit-plugins-openai==1.5.1
      - livekit-api==1.1.0
      - opentelemetry-api~=1.39.0
      - opentelemetry-sdk~=1.39.0
      - opentelemetry-semantic-conventions~=0.50b0
      - opencv-python
      - supabase==2.28.0
      - supabase-auth==2.28.0
      - supabase-functions==2.28.0
      - -e ./lib/faster-qwen3-tts
