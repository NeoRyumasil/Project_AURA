name: aura
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip
  - pip:
      - qwen-tts>=0.1.1
      - transformers>=4.48.0
      - huggingface-hub
      - accelerate
      - soundfile
      - librosa
      - numpy
      - python-dotenv
      - pyvts
      - aiohttp
      - livekit-agents[silero,turn-detector]
      - livekit-plugins-noise-cancellation
      - livekit-plugins-deepgram
      - livekit-plugins-cartesia
      - livekit-plugins-openai
      - livekit-api
      - -e ./lib/faster-qwen3-tts
